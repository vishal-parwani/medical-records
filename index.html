<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Medical Records</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Auth Screen -->
  <div id="auth-screen">
    <div class="auth-card">
      <div class="auth-logo">🩺</div>
      <h1>Family Medical Records</h1>
      <p>Sign in to view your family's records</p>
      <button id="apple-signin-btn" class="apple-btn">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 814 1000" width="18" height="18" fill="white"><path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76.5 0-103.7 40.8-165.9 40.8s-105-57.8-155.5-127.4C46 790.7 0 663 0 541.8c0-207.5 135.4-317.5 268.1-317.5 71.2 0 130.5 46.8 171.5 46.8 41 0 106.2-49.1 185.2-49.1zm-16.7-219.7c31.2-38.5 53.6-91.9 53.6-145.3 0-7.7-.6-15.4-1.9-21.7-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 85.7-55.1 139.8 0 8.3 1.3 16.6 1.9 19.2 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135-69.1z"/></svg>
        Sign in with Apple
      </button>
    </div>
  </div>

  <!-- App -->
  <div id="app" class="hidden">

    <header class="header">
      <span class="header-title">🩺 Family Medical Records</span>
      <div class="header-right">
        <span id="user-name" class="user-name"></span>
        <button id="sign-out-btn" class="btn-link">Sign out</button>
      </div>
    </header>

    <nav class="tab-nav" id="member-tab-nav"></nav>

    <main class="main-content" id="records-content"></main>
  </div>

  <!-- Modal: Edit Personal Info -->
  <div id="profile-modal" class="modal-backdrop hidden">
    <div class="modal">
      <div class="modal-header">
        <h3>Edit Personal Information</h3>
        <button class="modal-close" id="cancel-profile-btn-x" onclick="document.getElementById('profile-modal').classList.add('hidden')">✕</button>
      </div>
      <div class="modal-body" id="profile-modal-body">
        <input type="hidden" id="profile-modal-member-id">
      </div>
      <div class="modal-footer">
        <button id="cancel-profile-btn" class="btn btn-secondary">Cancel</button>
        <button id="save-profile-btn" class="btn btn-primary">Save</button>
      </div>
    </div>
  </div>

  <!-- Modal: Add/Edit Record (shared across all sections) -->
  <div id="record-modal" class="modal-backdrop hidden">
    <div class="modal">
      <div class="modal-header">
        <h3 id="record-modal-title">Add Record</h3>
        <button class="modal-close" onclick="document.getElementById('record-modal').classList.add('hidden')">✕</button>
      </div>
      <div class="modal-body" id="record-modal-body">
        <input type="hidden" id="record-modal-section-id">
        <input type="hidden" id="record-modal-doc-id">
      </div>
      <div class="modal-footer">
        <button id="cancel-record-btn" class="btn btn-secondary">Cancel</button>
        <button id="save-record-btn" class="btn btn-primary">Save</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
